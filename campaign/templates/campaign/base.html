{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Artist & IT Rewards{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav style="padding: 20px 0; position: fixed; width: 100%; z-index: 100; backdrop-filter: blur(10px);">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <div class="logo" style="font-weight: 800; font-size: 1.5rem; letter-spacing: -1px;">
                <span style="color: var(--secondary-color);">ARTIST</span>NAME
            </div>
            <div class="nav-links">
                <a href="/" style="color: white; text-decoration: none; margin-left: 30px; font-weight: 600;">Home</a>
                <a href="#campaign" style="color: white; text-decoration: none; margin-left: 30px; font-weight: 600;">Rewards</a>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Music Player -->
    <div class="music-player">
        <div class="progress-bar-container">
            <div class="progress-bar" id="player-progress"></div>
        </div>
        <div class="player-art">
            <img src="{% static 'images/album_cover.png' %}" alt="Current Track">
        </div>
        <div class="player-info">
            <h4 id="track-name">Midnight Protocol</h4>
            <p id="artist-name">Artist Name</p>
        </div>
        <div class="player-controls">
            <button class="control-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6L18 18V6z"></path></svg>
            </button>
            <button class="play-btn" id="master-play">
                <svg id="play-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"></path></svg>
            </button>
            <button class="control-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6zm9-12v12h2V6z"></path></svg>
            </button>
        </div>
    </div>

    <script src="{% static 'js/main.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
